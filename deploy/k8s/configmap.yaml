apiVersion: v1
kind: ConfigMap
metadata:
  name: skillhub-config
data:
  redis-host: redis
  redis-port: "6379"
  storage-base-path: /var/lib/skillhub/storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skillhub-storage-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
