server:
  port: 8080
  shutdown: graceful

spring:
  messages:
    basename: messages
  application:
    name: skillhub
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:postgresql://localhost:5432/skillhub
    username: skillhub
    password: skillhub_dev
    hikari:
      maximum-pool-size: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
    redis:
      namespace: skillhub:session
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:placeholder}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:placeholder}
            scope: read:user,user:email
        provider:
          github:
            user-info-uri: https://api.github.com/user
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

skillhub:
  access-policy:
    mode: OPEN
  storage:
    type: local
    local:
      base-path: ${STORAGE_BASE_PATH:/tmp/skillhub-storage}
  search:
    engine: postgres
    rebuild-on-startup: false
  publish:
    max-package-size: 104857600  # 100MB
    allowed-file-extensions: .py,.json,.yaml,.yml,.txt,.md,.sh

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
